# Recommended workflow:
# - `git add --verbose --patch` to stage changes
# - `git commit` to commit them
# - rinse and repeat, if pre-commit wants / applied changes

exclude: ^COPYING

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-added-large-files

- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # frozen: v1.25.2
  hooks:
  - id: zizmor
    args:
    - --fix

- repo: https://github.com/hukkin/mdformat
  rev: 82912cdaea4fb830f751504486a7879c70526547  # frozen: 1.0.0
  hooks:
  - id: mdformat
    additional_dependencies:
    - mdformat-black
    - mdformat-beautysh
    - mdformat-gfm
    - mdformat-myst
    - setuptools # Necessary until beautysh fix their stuff, see: https://github.com/hukkin/mdformat/issues/442

- repo: https://github.com/jackdewinter/pymarkdown
  rev: 491b8945442244c6b03028a96e9a8bde9ad63400  # frozen: v0.9.37
  hooks:
  - id: pymarkdown
    args:
    - --config=.pymarkdown.json
    - fix
