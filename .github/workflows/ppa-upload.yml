name: PPA Upload

on:
  push:
    branches:
    - main
    - release/[0-9]+.[0-9]+
    tags:
    - v[0-9]+.[0-9]+.[0-9]+

permissions: {}

jobs:
  PPAUpload:
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        release:
        - "26.04"
        - "devel"

    runs-on: ubuntu-latest

    steps:
    - name: Import GPG key
      id: gpg
      uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd  # v7.0.0
      with:
        gpg_private_key: ${{ secrets.MIR_BOT_GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.MIR_BOT_GPG_PASSPHRASE }}

    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        # Need full history for version determination
        fetch-depth: 0
        persist-credentials: false

    - name: Install dependencies
      run: |
        sudo apt-get install --no-install-recommends --yes \
          debhelper \
          devscripts \
          dput \
          dh-python \
          python3-launchpadlib

    - name: Set up Launchpad credentials
      uses: DamianReeves/write-file-action@6929a9a6d1807689191dcc8bbe62b54d70a32b42  # v1.3
      with:
        path: ${{ github.workspace }}/../lp_credentials
        contents: ${{ secrets.LAUNCHPAD_CREDENTIALS }}

    - name: Upload to PPA
      env:
        DEBFULLNAME: ${{ steps.gpg.outputs.name}}
        DEBEMAIL: ${{ steps.gpg.outputs.email }}
        RELEASE: ${{ matrix.release }}
      run: tools/ppa-upload.sh ${{ github.workspace }}/../lp_credentials

    - if: ${{ failure() && runner.debug }}
      name: Setup upterm session
      uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113  # v3.24
      with:
        limit-access-to-actor: true
